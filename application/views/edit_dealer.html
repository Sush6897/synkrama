<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4">Edit Details</h3>
                <div id="alertBox"></div>
                
                <?php 
                $postUrl = ($userType == 'employee') ? site_url('employee/update_dealer') : site_url('dealer/updateProfile');
                ?>
                
                <form id="editForm">
                    <!-- Only needed for Employee updating someone else -->
                    <?php if($userType == 'employee'): ?>
                    <input type="hidden" name="user_id" value="<?php echo $user_id; ?>">
                    <?php endif; ?>
                    
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input class="form-control" name="city" id="city" value="<?php echo isset($dealer) ? $dealer->city : ''; ?>" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">State</label>
                        <input class="form-control" name="state" id="state" value="<?php echo isset($dealer) ? $dealer->state : ''; ?>" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Zip Code</label>
                        <input class="form-control" name="zip" id="zip" value="<?php echo isset($dealer) ? $dealer->zip_code : ''; ?>" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" inputmode="numeric" maxlength="6" minlength="6">
                    </div>
                    <button class="btn btn-success w-100" type="submit">Update Details</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    $("#editForm").submit(function (e) {
        e.preventDefault();
        $.ajax({
            url: "<?php echo $postUrl; ?>",
            type: "POST",
            data: $(this).serialize(),
            success: function (res) {
                var data = JSON.parse(res);
                if (data.status) {
                    $('#alertBox').html('<div class="alert alert-success">'+data.message+'</div>');
                    setTimeout(function(){
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    $('#alertBox').html('<div class="alert alert-danger">'+data.message+'</div>');
                }
            }
        });
    });
</script>
</body>
</html>
