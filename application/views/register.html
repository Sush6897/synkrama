<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4">Register</h3>
                <div id="alertBox"></div>
                <form id="registerForm">
                    <div class="mb-3">
                        <label class="form-label">First Name</label>
                        <input class="form-control" name="first_name" id="first_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Last Name</label>
                        <input class="form-control" name="last_name" id="last_name" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" name="email" id="email" type="email" required>
                        <small id="emailError" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" id="password" minlength="6" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Confirm Password</label>
                        <input class="form-control" type="password" name="confirm_password" id="confirm_password" required>
                        <small id="passwordError" class="text-danger"></small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">User Type</label>
                        <select class="form-select" name="user_type" id="user_type">
                            <option value="Employee">Employee</option>
                            <option value="Dealer">Dealer</option>
                        </select>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Register</button>
                    <div class="mt-3 text-center">
                        <a href="<?php echo site_url('auth'); ?>">Already have an account? Login here.</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    // Validate email format (e.g. no synkrama@gmail)
    function isValidEmail(email) {
        var regex = /^[^\s@]+@[^\s@]+\.[a-zA-Z]{2,}$/;
        return regex.test(email);
    }

    // Ajax check email uniqueness on blur
    $('#email').on('blur', function(){
        var email = $(this).val();
        if(isValidEmail(email)) {
            $.post("<?php echo site_url('auth/check_email'); ?>", {email: email}, function(data){
                var res = JSON.parse(data);
                if(!res.status) {
                    $('#emailError').text(res.message);
                } else {
                    $('#emailError').text('');
                }
            });
        }
    });

    $("#registerForm").submit(function (e) {
        e.preventDefault();

        // Clear existing alerts
        $('#alertBox').html('');

        var firstName = $("#first_name").val().trim();
        var lastName = $("#last_name").val().trim();
        var email = $("#email").val().trim();
        var password = $("#password").val();
        var confirmPassword = $("#confirm_password").val();
        
        // Comprehensive JS Validation
        var nameRegex = /^[A-Za-z\s]+$/;

        if (firstName === '') {
            $('#alertBox').html('<div class="alert alert-danger">First Name is required.</div>');
            return false;
        }
        if (!nameRegex.test(firstName)) {
            $('#alertBox').html('<div class="alert alert-danger">First Name should only contain letters.</div>');
            return false;
        }

        if (lastName === '') {
            $('#alertBox').html('<div class="alert alert-danger">Last Name is required.</div>');
            return false;
        }
        if (!nameRegex.test(lastName)) {
            $('#alertBox').html('<div class="alert alert-danger">Last Name should only contain letters.</div>');
            return false;
        }
        if (email === '') {
            $('#alertBox').html('<div class="alert alert-danger">Email is required.</div>');
            return false;
        }
        if (!isValidEmail(email)) {
            $('#alertBox').html('<div class="alert alert-danger">Invalid email format.</div>');
            return false;
        }
        if($('#emailError').text() !== '') {
            $('#alertBox').html('<div class="alert alert-danger">Please use a different email address.</div>');
            return false;
        }
        if (password.length < 6) {
            $('#alertBox').html('<div class="alert alert-danger">Password must be at least 6 characters long.</div>');
            return false;
        }
        if (password !== confirmPassword) {
            $('#alertBox').html('<div class="alert alert-danger">Passwords do not match.</div>');
            return false;
        }

        $.ajax({
            url: "<?php echo site_url('auth/register'); ?>",
            type: "POST",
            data: $(this).serialize(),
            success: function (res) {
                var data = JSON.parse(res);
                if (data.status) {
                    $('#alertBox').html('<div class="alert alert-success">'+data.message+'</div>');
                    setTimeout(function(){
                        window.location.href = "<?php echo site_url('auth'); ?>";
                    }, 2000);
                } else {
                    $('#alertBox').html('<div class="alert alert-danger">'+data.message+'</div>');
                }
            }
        });
    });
</script>
</body>
</html>
