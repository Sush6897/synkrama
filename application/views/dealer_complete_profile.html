<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Complete Profile</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
    </style>
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Welcome</a>
        <div class="d-flex">
            <a href="<?php echo site_url('auth/logout'); ?>" class="btn btn-outline-light">Logout</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-4">
                <h3 class="text-center mb-4">Complete Your Profile</h3>
                <div class="alert alert-info">As a dealer logging in for the first time, please provide your location details.</div>
                <div id="alertBox"></div>
                <form id="profileForm">
                    <div class="mb-3">
                        <label class="form-label">City</label>
                        <input class="form-control" name="city" id="city" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">State</label>
                        <input class="form-control" name="state" id="state" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Zip Code</label>
                        <input class="form-control" name="zip" id="zip" required oninput="this.value = this.value.replace(/[^0-9]/g, '')" inputmode="numeric" maxlength="6" minlength="6">
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Save Details</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    $("#profileForm").submit(function (e) {
        e.preventDefault();
        $.ajax({
            url: "<?php echo site_url('dealer/updateProfile'); ?>",
            type: "POST",
            data: $(this).serialize(),
            success: function (res) {
                var data = JSON.parse(res);
                if (data.status) {
                    $('#alertBox').html('<div class="alert alert-success">'+data.message+'</div>');
                    setTimeout(function(){
                        window.location.href = data.redirect;
                    }, 1000);
                } else {
                    $('#alertBox').html('<div class="alert alert-danger">'+data.message+'</div>');
                }
            }
        });
    });
</script>
</body>
</html>
