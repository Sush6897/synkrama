<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .card { border: none; border-radius: 1rem; box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15); }
    </style>
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h3 class="text-center mb-4">Login</h3>
                <div id="alertBox"></div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <input class="form-control" name="email" id="email" type="email" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Password</label>
                        <input class="form-control" type="password" name="password" id="password" required>
                    </div>
                    <button class="btn btn-primary w-100" type="submit">Login</button>
                    <div class="mt-3 text-center">
                        <a href="<?php echo site_url('auth/register_view'); ?>">Don't have an account? Register here.</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
    $("#loginForm").submit(function (e) {
        e.preventDefault();
        $('#alertBox').html('<div class="alert alert-info">Sending login request...</div>');
        console.log("Submit clicked, sending AJAX...");
        $.ajax({
            url: "<?php echo site_url('auth/login'); ?>",
            type: "POST",
            data: $(this).serialize(),
            success: function (res) {
                try {
                    var data = JSON.parse(res);
                    if (data.status) {
                        window.location.href = data.redirect;
                    } else {
                        $('#alertBox').html('<div class="alert alert-danger">'+data.message+'</div>');
                    }
                } catch(e) {
                    $('#alertBox').html('<div class="alert alert-danger">Error parsing response: ' + res + '</div>');
                }
            },
            error: function (xhr, status, error) {
                $('#alertBox').html('<div class="alert alert-danger">Network/Server Error: ' + xhr.responseText + '</div>');
            }
        });
    });
</script>
</body>
</html>
